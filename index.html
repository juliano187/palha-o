<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Background Imersivo Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* html e body usam dvh para evitar problemas com a barra de endereços do Chrome/Safari no mobile */
        body, html {
            height: 100%;
            height: 100dvh; 
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .bg-fullscreen {
            /* Substitua pela sua imagem */
            background-image: url('palhaço.jpg');
            
            height: 100%;
            width: 100%;
            
            /* Centraliza e escala sem distorcer */
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .instruction-overlay {
            color: white;
            font-family: sans-serif;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            margin: 20px;
            transition: opacity 0.6s ease;
            user-select: none;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Ajuste de fonte para telas pequenas */
        @media (max-width: 600px) {
          
        }
    </style>
</head>
<body>

    <div class="bg-fullscreen" id="container">
        <div class="instruction-overlay" id="overlay">
           
        </div>
    </div>

    <audio id="musica" loop>
        <source src="la.mp3" type="audio/mpeg">
    </audio>

    <script>
        const container = document.getElementById('container');
        const musica = document.getElementById('musica');
        const overlay = document.getElementById('overlay');

        // Escuta tanto clique (PC) quanto toque (Mobile)
        container.addEventListener('click', function() {
            musica.play();
            overlay.classList.add('hidden');
        }, { once: true });
    </script>

</body>
</html>
