<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clique para Iniciar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            cursor: pointer; /* Muda o cursor para indicar que a tela é clicável */
        }

        /* Background em Tela Cheia */
        .bg-fullscreen {
            /* Substitua pela sua imagem */
            background-image: url('palhaço.jpg');
            
            height: 100vh;
            width: 100vw;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.9);
        }

        .instruction-tag {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none; /* Garante que o clique passe através do texto para o background */
            transition: opacity 0.5s ease;
        }

        /* Classe para sumir com o texto após o clique */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="bg-fullscreen" id="tela">
        <div class="instruction-tag" id="aviso">
            
        </div>
    </div>

    <audio id="meuAudio" loop>
        <source src="la.mp3" type="audio/mpeg">
    </audio>

    <script>
        const tela = document.getElementById('tela');
        const audio = document.getElementById('meuAudio');
        const aviso = document.getElementById('aviso');

        // Função para tocar o áudio ao clicar no background
        tela.addEventListener('click', function() {
            audio.play();
            
            // Esconde a instrução após o primeiro clique
            aviso.classList.add('fade-out');
            
            // Remove o ponteiro de clique para parecer uma tela comum
            document.body.style.cursor = 'default';
        }, { once: true }); // O "{ once: true }" garante que o evento só rode no primeiro clique
    </script>

</body>
</html>
